[build]
  command = "npm run build"
  publish = "dist"
  base = "frontend"

[build.environment]
  PYTHON_VERSION = "3.11"
  NODE_VERSION = "18"

[[redirects]]
  # Redirect /api to the live backend URL
  from = "/api/*"
  to = "https://ai-stock-analysis-backend.onrender.com/api/:splat" # Default placeholder, user should update this
  status = 200

[[redirects]]
  # SPA routing
  from = "/*"
  to = "/index.html"
  status = 200
